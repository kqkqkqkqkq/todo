name: Dependency Check

on:
  push:
    branches: [ "main" ]

jobs:
  dependency-check:
    name: OWASP Dependency-Check Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: 'gradle'

      - name: Setup Kotlin
        uses: kotlin/setup-kotlin@v1
        with:
          kotlin-version: '1.9.22'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build project with Gradle
        run: |
          ./gradlew build --no-daemon -x test
        env:
          GRADLE_USER_HOME: ~/.gradle

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: '${{ github.event.repository.name }}'
          path: '.'
          format: 'HTML'
          out: '${{ github.workspace }}/reports/dependency-check'
          args: >
            --failOnCVSS 5
            --enableRetired
            --analyzerGradleDependency=true

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: ${{ github.workspace }}/reports/dependency-check/
          retention-days: 30

      - name: Check for critical vulnerabilities
        if: failure()
        run: |
          echo "⚠️ КРИТИЧНЫЕ УЯЗВИМОСТИ НАЙДЕНЫ!"
          echo "CVSS score > 5 обнаружен в зависимостях проекта"
          echo "Проверьте отчет: reports/dependency-check/dependency-check-report.html"
          exit 1

      - name: Publish Security Analysis Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ github.workspace }}/reports/dependency-check/dependency-check-report.sarif