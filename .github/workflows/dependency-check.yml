name: Dependency Check

on:
  push:
    branches: [ "main" ]

jobs:
  dependency-check:
    name: OWASP Dependency-Check Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'  # 'adopt' устарел, лучше 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'  # Укажите вашу версию Gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build project with Gradle
        run: |
          ./gradlew build --no-daemon -x test
        env:
          GRADLE_USER_HOME: ~/.gradle

      - name: Run OWASP Dependency-Check
        uses: dependency-check/DependencyCheckAction@main  # Исправлено название Action
        id: depcheck
        with:
          project: '${{ github.event.repository.name }}'
          path: '.'  # Сканировать текущую директорию
          format: 'HTML'
          out: 'reports/dependency-check'  # Упрощен путь
          args: >
            --failOnCVSS 7
            --suppressionFile suppressions.xml
            --enableExperimental
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
            --nvdApiDelay 2000

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/dependency-check/
          retention-days: 30

      - name: Check for vulnerabilities
        if: failure()
        run: |
          echo "Проверьте отчет: reports/dependency-check/dependency-check-report.html"
          exit 1