name: DAST for Ktor Application

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    outputs:
      openapi-spec: ${{ steps.export-spec.outputs.spec-path }}
      app-url: ${{ steps.set-url.outputs.app-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Ktor application
        run: ./gradlew build -x test

      - name: Start Ktor application
        run: ./gradlew run

      - name: Wait for app to be ready
        run: sleep 15

      - name: Set app URL
        id: set-url
        run: echo "app-url=http://localhost:8080" >> $GITHUB_OUTPUT

      - name: Export OpenAPI spec
        id: export-spec
        run: echo "src/resources/documentation.yaml" >> $GITHUB_OUTPUT

      - name: Upload OpenAPI spec
        if: steps.export-spec.outputs.spec-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: ${{ steps.export-spec.outputs.spec-path }}

  zap-api-scan:
    needs: build-and-run
    runs-on: ubuntu-latest
    if: needs.build-and-run.outputs.openapi-spec != ''
    steps:
      - name: Download OpenAPI spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: .

      - name: List downloaded files
        run: |
          ls -la
          echo "OpenAPI spec: ${{ needs.build-and-run.outputs.openapi-spec }}"

      - name: OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          format: openapi
          target: ${{ needs.build-and-run.outputs.openapi-spec }}
          cmd_options: >
            -a
            -d
            -config globalalertlevel=Medium
            -config spider.maxDuration=10
            -config api.alert.maxPayloadSize=5000
          rules_file_name: '.zap/rules.tsv'
          fail_action: true
          artifact_name: zap-api-report

      - name: Upload ZAP API Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-api-security-report
          path: |
            report_html.html
            report_json.json
          if-no-files-found: warn

  zap-full-scan:
    needs: build-and-run
    runs-on: ubuntu-latest
    if: needs.build-and-run.outputs.openapi-spec == ''  # Запускаем только если нет OpenAPI
    steps:
      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: ${{ needs.build-and-run.outputs.app-url }}
          cmd_options: >
            -a
            -j
            -config globalalertlevel=Medium
            -config spider.maxDuration=10
            -config spider.maxDepth=5
            -config ajaxSpider.maxDuration=5
          rules_file_name: '.zap/rules.tsv'
          fail_action: true
          artifact_name: zap-full-scan-report

      - name: Upload ZAP Full Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-full-security-report
          path: |
            report_html.html
            report_json.json
          if-no-files-found: warn