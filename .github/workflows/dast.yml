name: DAST

on:
  workflow_dispatch:

jobs:
  # Job 1: Build and run Spring Boot app
  build-and-run:
    runs-on: ubuntu-latest
    outputs:
      openapi-spec: ${{ steps.export-spec.outputs.spec-path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Add Springdoc OpenAPI dependency (if not already present)
        run: |
          # Add to build.gradle.kts if missing:
          # implementation("org.springdoc:springdoc-openapi-starter-webmvc-ui:2.1.0")
          echo "Ensure springdoc dependency is in build.gradle.kts"

      - name: Build Spring Boot app
        run: ./gradlew build -x test

      - name: Start Spring Boot app
        run: |
          ./gradlew bootRun > app.log 2>&1 &
          sleep 30  # Wait for app to start
          echo "App started on port 8080"

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/v3/api-docs.yaml > /dev/null; then
              echo "App is ready!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          exit 1

      - name: Export OpenAPI spec
        id: export-spec
        run: |
          curl -s http://localhost:8080/v3/api-docs.yaml > openapi.yaml
          echo "spec-path=openapi.yaml" >> $GITHUB_OUTPUT
          echo "OpenAPI spec exported to openapi.yaml"

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.yaml


  zap_scan:
    needs: build-and-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download OpenAPI spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: .

      - name: OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          format: openapi
          target: 'openapi.yaml'  # Local file from artifact
          cmd_options: '-a'
          rules_file_name: '.zap/rules.tsv'  # Optional: custom rules
          fail_action: true  # Fail pipeline if alerts found
          artifact_name: zap-api-report

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: report_html.html